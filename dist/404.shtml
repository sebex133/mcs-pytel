    <p id="redirect-timer">4</p>
    <script>
      var redirect_timer = document.getElementById("redirect-timer");
      var timer = 4;
      setInterval(() => {
        timer = timer - 1;
        redirect_timer.innerHTML = String(timer);
        if (timer < 1) {
          redirect_timer.innerHTML = "Przekierowywanie...";
          document.location.href = "https://mcs-pytel.com"
        }
      }, 1000);
